<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보처리기사 실기 마무리 플래시카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22223a;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --correct: #00b894;
  --wrong: #e17055;
  --text: #f0f0f5;
  --text2: #9595b0;
  --border: #2d2d48;
  --card-front: linear-gradient(135deg, #1e1e35 0%, #2a2a50 100%);
  --card-back: linear-gradient(135deg, #1a2a3a 0%, #1e3a4a 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.app-header {
  padding: 20px 24px 12px;
  text-align: center;
  position: relative;
}
.app-header h1 {
  font-size: 1.3rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), #74b9ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.app-header .sub {
  font-size: 0.75rem;
  color: var(--text2);
  margin-top: 4px;
}

/* Mode Toggle */
.mode-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 8px 16px;
  flex-wrap: wrap;
}
.mode-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 0.75rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.mode-btn:hover { border-color: var(--accent2); }

/* Category Filter */
.cat-bar {
  display: flex;
  gap: 6px;
  padding: 8px 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 0.7rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.cat-chip.active {
  background: var(--surface2);
  color: var(--accent2);
  border-color: var(--accent);
}

/* Stats */
.stats-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 4px 16px 12px;
  font-size: 0.75rem;
  color: var(--text2);
}
.stats-row span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.total { background: var(--accent2); }
.dot.ok { background: var(--correct); }
.dot.ng { background: var(--wrong); }

/* Progress */
.progress-bar {
  height: 3px;
  background: var(--surface2);
  margin: 0 16px 16px;
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
  border-radius: 2px;
}

/* Card Area */
.card-container {
  perspective: 1200px;
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
  padding: 0 16px;
  height: 300px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
.card-inner.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border: 1px solid var(--border);
  overflow-y: auto;
}
.card-front { background: var(--card-front); }
.card-back {
  background: var(--card-back);
  transform: rotateY(180deg);
  border-color: #2a4a5a;
}
.card-label {
  position: absolute;
  top: 12px;
  left: 16px;
  font-size: 0.65rem;
  color: var(--text2);
  background: rgba(255,255,255,0.05);
  padding: 2px 8px;
  border-radius: 8px;
}
.card-num {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 0.65rem;
  color: var(--text2);
}
.card-text {
  font-size: 1.1rem;
  font-weight: 500;
  line-height: 1.7;
  word-break: keep-all;
}
.card-back .card-text {
  font-size: 0.95rem;
  font-weight: 400;
  color: #c0dce8;
}
.card-text .highlight {
  color: var(--accent2);
  font-weight: 700;
}
.card-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  background: rgba(108,92,231,0.15);
  padding: 1px 6px;
  border-radius: 4px;
}
.tap-hint {
  position: absolute;
  bottom: 12px;
  font-size: 0.6rem;
  color: var(--text2);
  opacity: 0.6;
}

/* Controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 20px 16px;
  max-width: 520px;
  margin: 0 auto;
}
.ctrl-btn {
  flex: 1;
  max-width: 140px;
  padding: 12px 0;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.8rem;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.ctrl-btn:hover { border-color: var(--accent); }
.ctrl-btn.wrong-btn:hover { border-color: var(--wrong); background: rgba(225,112,85,0.1); }
.ctrl-btn.correct-btn:hover { border-color: var(--correct); background: rgba(0,184,148,0.1); }
.ctrl-btn.flip-btn { background: var(--accent); border-color: var(--accent); }
.ctrl-btn.flip-btn:hover { background: #5a4bd6; }

/* Keyboard hints */
.key-hints {
  text-align: center;
  padding: 4px;
  font-size: 0.65rem;
  color: var(--text2);
  opacity: 0.5;
}
.key-hints kbd {
  display: inline-block;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  margin: 0 2px;
}

/* Complete Screen */
.complete-screen {
  display: none;
  text-align: center;
  padding: 60px 24px;
  max-width: 520px;
  margin: 0 auto;
}
.complete-screen.show { display: block; }
.complete-screen h2 {
  font-size: 1.4rem;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--correct), #55efc4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.complete-screen .score {
  font-size: 3rem;
  font-weight: 900;
  color: var(--accent2);
  margin: 16px 0;
}
.complete-screen p { color: var(--text2); font-size: 0.85rem; margin: 6px 0; }
.restart-btn {
  margin-top: 24px;
  padding: 12px 32px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.9rem;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:hover { background: #5a4bd6; }
.review-wrong-btn {
  margin-top: 10px;
  padding: 10px 28px;
  border-radius: 12px;
  border: 1px solid var(--wrong);
  background: transparent;
  color: var(--wrong);
  font-size: 0.8rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.review-wrong-btn:hover { background: rgba(225,112,85,0.1); }

/* Shuffle */
.shuffle-btn {
  position: absolute;
  top: 18px;
  right: 16px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.shuffle-btn:hover { border-color: var(--accent); color: var(--accent2); }

/* Responsive */
@media (max-width: 480px) {
  .card-container { height: 260px; }
  .card-text { font-size: 1rem; }
  .card-back .card-text { font-size: 0.85rem; }
  .controls { gap: 10px; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>정보처리기사 실기 마무리 플래시카드</h1>
  <div class="sub">2026년 대비 · 흥달쌤 마무리 특강 기반</div>
  <button class="shuffle-btn" onclick="shuffleCards()" title="섞기">🔀</button>
</div>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="term" onclick="setMode('term')">용어→설명</button>
  <button class="mode-btn" data-mode="def" onclick="setMode('def')">설명→용어 (추천)</button>
</div>

<div class="cat-bar" id="catBar"></div>

<div class="stats-row">
  <span><span class="dot total"></span>전체 <b id="totalCount">0</b></span>
  <span><span class="dot ok"></span>정답 <b id="okCount">0</b></span>
  <span><span class="dot ng"></span>오답 <b id="ngCount">0</b></span>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div id="cardArea">
  <div class="card-container" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-label" id="cardCat"></div>
        <div class="card-num" id="cardNum"></div>
        <div class="card-text" id="frontText"></div>
        <div class="tap-hint">탭하여 뒤집기</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label" id="cardCat2"></div>
        <div class="card-num" id="cardNum2"></div>
        <div class="card-text" id="backText"></div>
        <div class="tap-hint">탭하여 뒤집기</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn wrong-btn" onclick="markWrong()">✕ 모르겠어요</button>
    <button class="ctrl-btn flip-btn" onclick="flipCard()">뒤집기</button>
    <button class="ctrl-btn correct-btn" onclick="markCorrect()">○ 알고있어요</button>
  </div>

  <div class="key-hints">
    <kbd>Space</kbd> 뒤집기 · <kbd>←</kbd> 모름 · <kbd>→</kbd> 앎
  </div>
</div>

<div class="complete-screen" id="completeScreen">
  <h2>학습 완료!</h2>
  <div class="score" id="finalScore"></div>
  <p id="finalDetail"></p>
  <button class="restart-btn" onclick="restart()">처음부터 다시</button>
  <br>
  <button class="review-wrong-btn" id="reviewWrongBtn" onclick="reviewWrong()">틀린 문제만 복습</button>
</div>

<script>
const DATA = [
// ── 01 소프트웨어 구축 ──
{c:"SW공학",t:"소프트웨어 공학",d:"품질 높은 소프트웨어를 효율적으로 개발하기 위한 학문"},
{c:"SW공학",t:"소프트웨어 공학 3R",d:"역공학(Reverse Engineering), 재공학(Re-Engineering), 재사용(Reuse)"},
{c:"SW공학",t:"재공학 과정",d:"분석 → 재구성 → 역공학 → 이관"},
{c:"SW공학",t:"소프트웨어 개발 단계",d:"계획 → 분석 → 설계 → 구현 → 테스트 → 유지보수"},
{c:"SW공학",t:"구조적 방법론",d:"DFD, DD, STD, Minispec을 사용하는 개발 방법론"},
{c:"SW공학",t:"CBD 방법론",d:"Component Based Development, 컴포넌트 기반 개발 방법론"},
{c:"SW공학",t:"폭포수 모델",d:"각 단계를 확실히 마무리 짓고 다음 단계로 넘어가는 개발 모델"},
{c:"SW공학",t:"나선형 모델(Spiral)",d:"위험 분석을 포함한 반복적 개발 모델"},
{c:"SW공학",t:"V 모형",d:"개발 단계와 테스트 단계를 대응시킨 모델"},
{c:"SW공학",t:"XP 핵심 가치",d:"용기, 존중, 의사소통, 피드백, 단순성"},
{c:"SW공학",t:"스크럼(SCRUM)",d:"백로그, 스프린트를 활용하는 애자일 방법론"},
{c:"SW공학",t:"COCOMO 모형",d:"조직형(5만 이하), 반분리형(30만 이하), 내장형(30만 이상) - 비용 산정 기법"},
{c:"SW공학",t:"Putnam 모형",d:"Rayleigh-Norden 곡선, SLIM 도구를 사용하는 비용 산정 기법"},
{c:"SW공학",t:"기능 점수(FP)",d:"내부 논리 파일, 외부 연계 파일, 외부 입력, 외부 출력, 외부 조회 - ESTIMACS 도구"},
{c:"SW공학",t:"LOC 추정 공식",d:"(낙관치 + 4×기대치 + 비관치) / 6"},
{c:"SW공학",t:"PERT / CPM",d:"PERT는 불확실한 상황, CPM은 확정 상황에서의 일정 산정 기법"},
{c:"SW공학",t:"임계경로(Critical Path)",d:"프로젝트 완료까지 가장 긴 경로, 최소 소요 기간을 결정"},
{c:"SW공학",t:"HIPO",d:"하향식 개발을 위한 문서화 도구. 가시적 도표, 총체적 도표, 세부적 도표로 구성"},
{c:"SW공학",t:"DFD(자료 흐름도)",d:"데이터의 흐름을 표현하는 구조적 분석 도구"},
{c:"SW공학",t:"DD(자료사전)",d:"자료 항목의 의미와 구성을 정의하는 도구"},
{c:"SW공학",t:"럼바우(Rumbaugh) 방법",d:"객체 모델링(객체 다이어그램), 동적 모델링(상태 다이어그램), 기능 모델링(DFD)"},
{c:"SW공학",t:"Jacobson 방법",d:"Use Case 중심의 객체지향 분석 방법론"},
{c:"SW공학",t:"Coad와 Yourdon 방법",d:"ER 다이어그램을 사용하는 객체지향 분석 방법론"},

// 요구사항·미들웨어
{c:"SW공학",t:"요구사항 개발 프로세스",d:"도출 → 분석 → 명세 → 확인"},
{c:"SW공학",t:"기능 요구사항",d:"시스템이 제공하는 기능에 대한 요구사항"},
{c:"SW공학",t:"비기능 요구사항",d:"품질 특성이나 제약사항에 대한 요구사항"},
{c:"SW공학",t:"미들웨어 종류",d:"RPC, MOM, ORB, DB 접속, TP 모니터, WAS, ESB"},

// 설계
{c:"SW설계",t:"상위 설계",d:"아키텍처, 데이터, 인터페이스 정의, UI 설계"},
{c:"SW설계",t:"하위 설계",d:"모듈, 자료구조, 알고리즘을 설계"},
{c:"SW설계",t:"협약에 의한 설계",d:"선행조건, 결과조건, 불변조건을 명시하는 설계 방식"},
{c:"SW설계",t:"추상화(Abstraction)",d:"과정 추상화, 데이터 추상화, 제어 추상화"},
{c:"SW설계",t:"4+1 뷰",d:"논리 뷰, 구현 뷰, 프로세스 뷰, 배치 뷰, 유스케이스 뷰"},
{c:"SW설계",t:"파이프-필터 패턴",d:"데이터를 순차적으로 변환하는 아키텍처 패턴"},
{c:"SW설계",t:"브로커 패턴",d:"분산 시스템에서 클라이언트 요청을 적절한 서버로 중개하는 패턴"},
{c:"SW설계",t:"MVC 패턴",d:"모델(데이터)-뷰(화면)-컨트롤러(제어)로 분리한 아키텍처 패턴"},

// UML
{c:"UML",t:"UML 특징",d:"가시화 언어, 명세화 언어, 구축 언어, 문서화 언어"},
{c:"UML",t:"UML 구성요소",d:"사물(Things), 관계(Relationship), 다이어그램(Diagram)"},
{c:"UML",t:"일반화 관계(Generalization)",d:"상속 관계를 나타냄 (실선 + 빈 삼각형 화살표)"},
{c:"UML",t:"연관 관계(Association)",d:"관련된 관계 (실선)"},
{c:"UML",t:"의존 관계(Dependency)",d:"짧은 시간만 사용하는 관계 (점선 화살표)"},
{c:"UML",t:"실체화 관계(Realization)",d:"추상 메서드를 오버라이딩하는 관계 (점선 + 빈 삼각형)"},
{c:"UML",t:"집약 관계(Aggregation)",d:"부분 객체가 독립적인 집합 관계 (빈 마름모)"},
{c:"UML",t:"합성 관계(Composition)",d:"부분 객체가 의존적인 집합 관계 (채운 마름모)"},
{c:"UML",t:"구조 다이어그램 종류",d:"클래스, 객체, 컴포넌트, 배치, 복합체 구조, 패키지 다이어그램"},
{c:"UML",t:"행위 다이어그램 종류",d:"유스케이스, 순차, 커뮤니케이션, 상태, 활동, 상호작용, 타이밍 다이어그램"},
{c:"UML",t:"순차 다이어그램",d:"시간 순서에 따른 객체 간의 상호작용을 표현"},
{c:"UML",t:"활동 다이어그램",d:"업무의 흐름을 표현, 유스케이스의 구체적인 흐름"},

{c:"신기술",t:"하이퍼바이저(Hypervisor)",d:"하나의 서버에 여러 운영체제를 실행할 수 있게 하는 기술"},

{c:"신기술",t:"RFID(전파 식별)",d:"태그와 리더를 이용한 비접촉식 데이터 교환"},
{c:"신기술",t:"ZigBee",d:"저전력·저비용 단거리 무선 통신 기술"},
{c:"신기술",t:"MQTT",d:"경량 발행·구독(Publish-Subscribe) 방식의 IoT용 메시징 프로토콜"},
{c:"신기술",t:"빅 데이터 5V",d:"Volume(규모), Variety(다양성), Velocity(속도), Veracity(정확성), Value(가치)"},

{c:"신기술",t:"하둡(Hadoop)",d:"HDFS 기반의 대규모 분산 데이터 저장 및 처리 프레임워크"},
{c:"신기술",t:"맵리듀스(MapReduce)",d:"대규모 데이터를 분산 처리하는 프로그래밍 모델"},
{c:"신기술",t:"OLAP",d:"대량 데이터를 빠르게 분석·조회하는 온라인 분석 처리 기술"},

{c:"신기술",t:"파레토 법칙",d:"20%의 모듈에서 80%의 결함이 발견된다"},
{c:"신기술",t:"Boehm의 법칙",d:"초기 단계에서의 결함 발견이 비용 절감에 효과적"},
{c:"신기술",t:"무어의 법칙",d:"집적회로의 성능은 18~24개월마다 2배로 증가한다"},
{c:"신기술",t:"온톨로지(Ontology)",d:"사람의 생각을 컴퓨터가 이해할 수 있도록 개념화하여 표현하는 기술"},
{c:"신기술",t:"시맨틱 웹",d:"자원의 의미를 기계가 이해하고 처리할 수 있게 하는 차세대 웹 기술"},
{c:"신기술",t:"메시 네트워크",d:"여러 노드가 상호 연결되어 자체적으로 네트워크를 형성"},
{c:"신기술",t:"애드 혹 네트워크(Ad-hoc)",d:"기지국 없이 노드들끼리 연결되는 임시 네트워크"},
{c:"신기술",t:"LOD(Linked Open Data)",d:"공개 데이터를 URI와 RDF로 연결하여 재사용할 수 있게 한 것"},
];

// ── State ──
let cards = [...DATA];
let filtered = [...DATA];
let idx = 0;
let flipped = false;
let mode = 'term'; // 'term' = 용어→설명, 'def' = 설명→용어
let okSet = new Set();
let ngSet = new Set();
let answered = new Set();

// Get unique categories
const categories = [...new Set(DATA.map(d => d.c))];

// Init category bar
function initCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = '<button class="cat-chip active" data-cat="all" onclick="filterCat(\'all\')">전체</button>';
  categories.forEach(c => {
    const count = DATA.filter(d => d.c === c).length;
    bar.innerHTML += `<button class="cat-chip" data-cat="${c}" onclick="filterCat('${c}')">${c} (${count})</button>`;
  });
}

function filterCat(cat) {
  document.querySelectorAll('.cat-chip').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
  
  if (cat === 'all') filtered = [...DATA];
  else filtered = DATA.filter(d => d.c === cat);
  
  cards = [...filtered];
  idx = 0;
  okSet.clear();
  ngSet.clear();
  answered.clear();
  flipped = false;
  updateCard();
  updateStats();
  showCardArea(true);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-mode="${m}"]`).classList.add('active');
  flipped = false;
  updateCard();
}

function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  idx = 0;
  okSet.clear();
  ngSet.clear();
  answered.clear();
  flipped = false;
  updateCard();
  updateStats();
  showCardArea(true);
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}

function updateCard() {
  if (idx >= cards.length) { showComplete(); return; }
  const c = cards[idx];
  const front = mode === 'term' ? c.t : c.d;
  const back = mode === 'term' ? c.d : c.t;
  const frontLabel = mode === 'term' ? '용어' : '설명';
  const backLabel = mode === 'term' ? '설명' : '용어';

  document.getElementById('frontText').innerHTML = front;
  document.getElementById('backText').innerHTML = back;
  document.getElementById('cardCat').textContent = c.c;
  document.getElementById('cardCat2').textContent = c.c;
  document.getElementById('cardNum').textContent = `${idx + 1} / ${cards.length}`;
  document.getElementById('cardNum2').textContent = `${idx + 1} / ${cards.length}`;
  
  document.getElementById('cardInner').classList.remove('flipped');
  flipped = false;
}

function markCorrect() {
  if (idx >= cards.length) return;
  const key = cards[idx].t;
  okSet.add(key);
  ngSet.delete(key);
  answered.add(key);
  idx++;
  updateStats();
  updateCard();
}

function markWrong() {
  if (idx >= cards.length) return;
  const key = cards[idx].t;
  ngSet.add(key);
  okSet.delete(key);
  answered.add(key);
  idx++;
  updateStats();
  updateCard();
}

function updateStats() {
  document.getElementById('totalCount').textContent = cards.length;
  document.getElementById('okCount').textContent = okSet.size;
  document.getElementById('ngCount').textContent = ngSet.size;
  const pct = cards.length ? ((okSet.size + ngSet.size) / cards.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function showCardArea(show) {
  document.getElementById('cardArea').style.display = show ? '' : 'none';
  document.getElementById('completeScreen').classList.toggle('show', !show);
}

function showComplete() {
  document.getElementById('cardArea').style.display = 'none';
  const cs = document.getElementById('completeScreen');
  cs.classList.add('show');
  const total = okSet.size + ngSet.size;
  const pct = total ? Math.round(okSet.size / total * 100) : 0;
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('finalDetail').textContent = `정답 ${okSet.size}개 / 오답 ${ngSet.size}개 (전체 ${total}개)`;
  document.getElementById('reviewWrongBtn').style.display = ngSet.size > 0 ? '' : 'none';
}

function restart() {
  cards = [...filtered];
  idx = 0;
  okSet.clear();
  ngSet.clear();
  answered.clear();
  flipped = false;
  updateCard();
  updateStats();
  showCardArea(true);
}

function reviewWrong() {
  cards = DATA.filter(d => ngSet.has(d.t));
  idx = 0;
  const prevNg = ngSet.size;
  okSet.clear();
  ngSet.clear();
  answered.clear();
  flipped = false;
  updateCard();
  updateStats();
  showCardArea(true);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  else if (e.key === 'ArrowRight') markCorrect();
  else if (e.key === 'ArrowLeft') markWrong();
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx > 0) markCorrect(); else markWrong();
  }
});

// Init
initCatBar();
shuffleCards();
</script>
</body>
</html>
